
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador Estatístico de Roleta</title>
    <script type="text/javascript" src="https://me.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=X04Tjz0jQoIq_7p4qd4M1nzt2nSeeOcZ980cAaV-PUaOUjYsHSF4pM901JCuDztY-9sSkPGkdtMmlBPyGSv9itqjSNCl0hUbBUYwOcoGAEH8TlupAhS6b2RiwGfOwwUM1odK-2rZyySlL-Ks2gl1ddoa_iSknYMUvCjmnv3lHKGUAuaD6rKJUrydqUD7GFxCAh0u3i9RN-g97Jr1kw0jWN4AfRWDfMymNs_82GqR-inRgPLhhWMzGoEl9KpI9G7iAHz0cv9MnXXPAeoN1Ka63nE4U_N0MGeNj2zzzuXiDtr8ZzdwVyO_ScLVNrz2JnD_" charset="UTF-8"></script><link rel="stylesheet" crossorigin="anonymous" href="https://me.kis.v2.scr.kaspersky-labs.com/E3E8934C-235A-4B0E-825A-35A08381A191/abn/main.css?attr=aHR0cHM6Ly9jb250cmlidXRpb24udXNlcmNvbnRlbnQuZ29vZ2xlLmNvbS9kb3dubG9hZD9jPUNneGlZWEprWDNOMGIzSmhaMlVTVEJJSmRHVnRjRjlrWVhSaEdqOEtNRFZsWVdZNU1EZ3haRGN4WXpWaU1qTXdNREEyTlRFeE5UUXlPREExWldZME1EWTJNVGd6T0dRd09UTTBZVFV5TkJJTEVnY1FxUDZBMU5VTUdBRSZmaWxlbmFtZT1pbmRleC5odG1sJm9waT0xMDMxMzUwNTA"/><style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #eee; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        header { text-align: center; margin-bottom: 30px; }
        .grid-input { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-bottom: 20px; }
        button.num { padding: 15px 5px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; background: #333; color: white; transition: 0.2s; }
        button.num:hover { background: #555; }
        .n-0 { grid-column: span 10; background: #27ae60 !important; }
        .red { background: #c0392b !important; }
        .black { background: #2c3e50 !important; }
        .stats-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .card { background: #252525; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #444; }
        .hot { color: #e74c3c; font-weight: bold; }
        .cold { color: #3498db; font-weight: bold; }
        #history { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .hist-item { padding: 2px 8px; border-radius: 3px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Roulette Statistical Engine</h1>
            <p>Análise de Desvio em Tempo Real (Z-Score)</p>
        </header>

        <div class="grid-input" id="keyboard"></div>

        <div class="stats-grid">
            <div class="card">
                <h3>Histórico Recente</h3>
                <div id="history"></div>
                <button onclick="clearData()" style="margin-top:20px; width:100%; padding:10px; background:#d35400; border:none; color:white; cursor:pointer; border-radius:4px;">Limpar Dados</button>
            </div>
            <div class="card">
                <h3>Análise de Probabilidade (Ordenado por Atraso)</h3>
                <table id="statsTable">
                    <thead>
                        <tr>
                            <th>Número</th>
                            <th>Frequência</th>
                            <th>Z-Score</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const REDS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
        let history = JSON.parse(localStorage.getItem('roulette_history') || '[]');

        function initKeyboard() {
            const kb = document.getElementById('keyboard');
            for(let i=0; i<=36; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = 'num ' + (i === 0 ? 'n-0' : (REDS.includes(i) ? 'red' : 'black'));
                btn.onclick = () => addNumber(i);
                kb.appendChild(btn);
            }
        }

        function addNumber(n) {
            history.push(n);
            localStorage.setItem('roulette_history', JSON.stringify(history));
            updateUI();
        }

        function clearData() {
            if(confirm('Limpar histórico?')) {
                history = [];
                localStorage.removeItem('roulette_history');
                updateUI();
            }
        }

        function updateUI() {
            const histDiv = document.getElementById('history');
            histDiv.innerHTML = history.slice(-20).reverse().map(n => 
                `<span class="hist-item ${n===0?'n-0':(REDS.includes(n)?'red':'black')}">${n}</span>`
            ).join('');

            const stats = calculateStats();
            const tbody = document.querySelector('#statsTable tbody');
            tbody.innerHTML = stats.slice(0, 10).map(s => `
                <tr>
                    <td>${s.num}</td>
                    <td>${s.count}</td>
                    <td>${s.zScore.toFixed(2)}</td>
                    <td class="${s.zScore < 0 ? 'cold' : 'hot'}">${s.zScore < 0 ? 'Frio (Atrasado)' : 'Quente (Frequente)'}</td>
                </tr>
            `).join('');
        }

        function calculateStats() {
            const counts = {};
            for(let i=0; i<=36; i++) counts[i] = 0;
            history.forEach(n => counts[n]++);

            const total = history.length;
            if (total === 0) return [];
            
            const expected = total / 37;
            
            return Object.keys(counts).map(num => {
                const count = counts[num];
                // Desvio Padrão da Binomial aproximada: sqrt(n * p * (1-p))
                const stdDev = Math.sqrt(total * (1/37) * (36/37));
                const zScore = stdDev === 0 ? 0 : (count - expected) / stdDev;
                return { num, count, zScore };
            }).sort((a, b) => a.zScore - b.zScore); 
        }

        initKeyboard();
        updateUI();
    </script>
</body>
</html>
